name: Deploy Rails

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: false
        default: "main"
      environment:
        description: "GitOps environment to bump (staging or production)"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: vcp.ocir.io
  IMAGE_NAME: sitio-rails

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.environment }}-latest
          cache-from: type=gha,scope=sitio-rails
          cache-to: type=gha,mode=max,scope=sitio-rails

      - uses: actions/checkout@v4
        with:
          repository: artieeez/artr-gitops
          token: ${{ secrets.ARTR_GITOPS_REPO_TOKEN }}
          path: artr-gitops

      - name: Bump image tag in GitOps
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          ENV_NAME="${{ github.event.inputs.environment }}"
          NS="sitio-${ENV_NAME}"
          FILE="artr-gitops/apps/${NS}/sitio-rails/deployment.yaml"
          sed -i "s|image: vcp.ocir.io/.*/sitio-rails:.*|image: vcp.ocir.io/${{ secrets.OCIR_NAMESPACE }}/sitio-rails:sha-${SHORT_SHA}|" "$FILE"

      - name: Commit & push GitOps
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          ENV_NAME="${{ github.event.inputs.environment }}"
          NS="sitio-${ENV_NAME}"
          cd artr-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "apps/${NS}/sitio-rails/deployment.yaml" 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore(gitops): bump sitio-rails (${ENV_NAME}) to sha-${SHORT_SHA}"
          git push origin HEAD
