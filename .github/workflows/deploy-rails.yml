name: Deploy Rails

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build and deploy to staging"
        required: false
        default: "main"

env:
  REGISTRY: vcp.ocir.io
  IMAGE_NAME: sitio-rails

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Resolve ref
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.meta.outputs.ref }}

      - name: Compute short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:sha-${{ env.SHORT_SHA }}
            ${{ env.REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:staging-latest
          cache-from: type=gha,scope=sitio-rails
          cache-to: type=gha,mode=max,scope=sitio-rails

      - uses: actions/checkout@v7
        with:
          repository: artieeez/artr-gitops
          token: ${{ secrets.ARTR_GITOPS_REPO_TOKEN }}
          path: artr-gitops

      - name: Bump staging image tag in GitOps
        env:
          OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
        run: |
          FILE="artr-gitops/apps/sitio-staging/sitio-rails/deployment.yaml"
          sed -i "s|image: vcp.ocir.io/.*/sitio-rails:.*|image: vcp.ocir.io/${OCIR_NAMESPACE}/sitio-rails:sha-${SHORT_SHA}|" "$FILE"

      - name: Commit & push GitOps
        run: |
          cd artr-gitops
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/sitio-staging/sitio-rails/deployment.yaml 2>/dev/null || true
          git diff --cached --quiet && exit 0
          git commit -m "chore(gitops): bump sitio-rails (staging) to sha-${SHORT_SHA}"
          git push origin HEAD
