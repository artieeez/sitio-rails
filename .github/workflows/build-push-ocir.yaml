name: Build and push OCIR

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to build and push to OCIR"
        required: false
        default: "main"

env:
  REGISTRY: vcp.ocir.io
  IMAGE_NAME: sitio-rails

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "ref=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.branch }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.ref.outputs.ref }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v4

      - name: Log in to OCIR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_AUTH_TOKEN }}

      - name: Image tags
        id: meta
        env:
          OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
        run: |
          HEAD_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(echo "$HEAD_SHA" | cut -c1-7)"
          echo "sha_tag=sha-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${OCIR_NAMESPACE}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/arm64
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.sha_tag }}
            ${{ steps.meta.outputs.image }}:staging-latest
          cache-from: type=gha,scope=sitio-rails
          cache-to: type=gha,mode=max,scope=sitio-rails

  update-gitops:
    needs: build
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for ARTR_GITOPS_REPO_TOKEN
        id: gate
        env:
          ARTR_GITOPS_REPO_TOKEN: ${{ secrets.ARTR_GITOPS_REPO_TOKEN }}
        run: |
          if [ -z "$ARTR_GITOPS_REPO_TOKEN" ]; then
            echo "ARTR_GITOPS_REPO_TOKEN not set — skipping gitops bump (image was still pushed)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout artr-gitops
        if: steps.gate.outputs.skip == 'false'
        uses: actions/checkout@v7
        with:
          repository: artieeez/artr-gitops
          token: ${{ secrets.ARTR_GITOPS_REPO_TOKEN }}
          path: gitops

      - name: Bump staging image tag
        if: steps.gate.outputs.skip == 'false'
        env:
          IMAGE: ${{ needs.build.outputs.image }}:${{ needs.build.outputs.sha_tag }}
        run: |
          FILE=gitops/apps/sitio-staging/sitio-rails/deployment.yaml
          if ! grep -q 'image: vcp.ocir.io/.*/sitio-rails:' "$FILE"; then
            echo "Expected image line not found in $FILE" >&2
            exit 1
          fi
          sed -i "s|image: vcp.ocir.io/.*/sitio-rails:.*|image: ${IMAGE}|" "$FILE"

      - name: Commit and push
        if: steps.gate.outputs.skip == 'false'
        working-directory: gitops
        run: |
          git config user.name "sitio-rails-ci-bot"
          git config user.email "sitio-rails-ci-bot@users.noreply.github.com"
          git add apps/sitio-staging/sitio-rails/deployment.yaml
          if git diff --staged --quiet; then
            echo "No image change"
            exit 0
          fi
          git commit -m "chore(sitio-rails): bump staging image to ${{ needs.build.outputs.sha_tag }}"
          git push
