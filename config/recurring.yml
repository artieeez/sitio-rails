production:
  conceal_expired_trips_in_store:
    class: Trip::ConcealExpiredInStoreJob
    queue: low_priority
    schedule: every hour

  clear_solid_queue_finished_jobs:
    command: "SolidQueue::Job.clear_finished_in_batches(sleep_between_batches: 0.3)"
    schedule: every hour at minute 12

development:
  conceal_expired_trips_in_store:
    class: Trip::ConcealExpiredInStoreJob
    queue: low_priority
    schedule: every hour

